<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Chat</title>

<style>

body{
margin:0;
background:#0b141a;
color:white;
font-family:Poppins,Arial,sans-serif;
}


.chat-app{
height:100vh;
display:flex;
flex-direction:column;
}


.header{
background:#202c33;
padding:15px;
display:flex;
align-items:center;
gap:15px;
}


.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#25d366;
display:flex;
align-items:center;
justify-content:center;
}


.messages{

flex:1;
padding:15px;
overflow-y:auto;

}



.message{

background:#202c33;
padding:10px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;

}



.my-message{

margin-left:auto;
background:#005c4b;

}



.input-area{

display:flex;
padding:10px;
background:#202c33;

}



.input-area input{

flex:1;
padding:12px;
border:none;
border-radius:20px;
outline:none;

}



.input-area button{

margin-left:10px;
border:none;
background:#25d366;
color:white;
border-radius:50%;
width:45px;
height:45px;

}


</style>

</head>



<body>


<div class="chat-app">



<div class="header">

<img
id="chatImage"
src="../assets/default-avatar.png"
style="
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
">


<div>

<h3 id="chatName">
Chat
</h3>


<small id="chatStatus">
Offline
</small>


</div>


</div>





<div id="messages" class="messages">


Loading messages...


</div>






<div class="input-area">


<input id="messageInput" placeholder="Type a message">


<button id="sendBtn">
➤
</button>


</div>



</div>





<script type="module" src="../js/chat.js"></script>



</body>

</html>
