<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Chat</title>


<style>

body{

margin:0;
background:#0b141a;
color:white;
font-family:Poppins,Arial,sans-serif;

}



.chat-app{

height:100vh;
display:flex;
flex-direction:column;

}




.header{

background:#202c33;
padding:12px 15px;
display:flex;
align-items:center;
gap:12px;

}




.back{

font-size:25px;
cursor:pointer;
}



.avatar{

width:45px;
height:45px;
border-radius:50%;
object-fit:cover;

}





.profile-info{

display:flex;
flex-direction:column;

}



.profile-info h3{

margin:0;
font-size:17px;

}



.profile-info small{

color:#25d366;

}





.messages{

flex:1;
padding:15px;
overflow-y:auto;

}




.message{

background:#202c33;
padding:10px 14px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;
word-wrap:break-word;

}




.my-message{

margin-left:auto;
background:#005c4b;

}





.input-area{

display:flex;
padding:10px;
background:#202c33;

}





.input-area input{

flex:1;
padding:12px;
border:none;
border-radius:20px;
outline:none;
font-size:15px;

}





.input-area button{

margin-left:10px;
border:none;
background:#25d366;
color:white;
border-radius:50%;
width:45px;
height:45px;
font-size:18px;

}



</style>


</head>




<body>




<div class="chat-app">






<div class="header">



<div class="back"

onclick="history.back()">

←

</div>





<img

id="chatImage"

src="../assets/default-avatar.png"

class="avatar"

>





<div class="profile-info">



<h3 id="chatName">

Chat

</h3>




<small id="chatStatus">

Offline

</small>



</div>




</div>









<div id="messages" class="messages">


Loading messages...


</div>









<div class="input-area">


<input

id="messageInput"

placeholder="Type a message"

>



<button id="sendBtn">

➤

</button>



</div>







</div>








<script type="module">


const chatName =

sessionStorage.getItem("chatUserName");



const chatImage =

sessionStorage.getItem("chatUserImage");





if(chatName){

document.getElementById("chatName").innerText = chatName;

}





if(chatImage){

document.getElementById("chatImage").src = chatImage;

}




</script>






<script type="module" src="../js/chat.js"></script>



</body>

</html>
