<!DOCTYPE html>
<html lang="en">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Calls</title>

<link rel="stylesheet" href="../css/auth.css">


<style>

body{

margin:0;

background:#0b141a;

color:white;

font-family:Poppins,Arial,sans-serif;

}


.app{

min-height:100vh;

padding-bottom:80px;

}


.header{

background:#202c33;

padding:20px;

display:flex;

align-items:center;

gap:15px;

}


.logo{

font-size:28px;

font-weight:bold;

color:#25d366;

}



.call-card{

margin:20px;

background:#202c33;

padding:20px;

border-radius:15px;

}



.call-item{

display:flex;

align-items:center;

justify-content:space-between;

padding:15px 0;

border-bottom:1px solid #2a3942;

}



.user{

display:flex;

align-items:center;

gap:15px;

}



.avatar{

width:50px;

height:50px;

border-radius:50%;

background:#25d366;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

}



.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

height:70px;

background:#202c33;

display:flex;

justify-content:space-around;

align-items:center;

}



.bottom-nav a{

color:white;

text-decoration:none;

font-size:12px;

text-align:center;

}



.bottom-nav span{

display:block;

font-size:22px;

}



</style>

</head>

<div class="app">


<div class="header">

<div class="logo">
Z+
</div>

Calls
</h2>

</div>

</h2>

</div>


<div>

</h3>

</p>

</div>


</div>


<div>
📞

</div>



</div>






<div class="bottom-nav">
