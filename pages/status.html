<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Status</title>


<style>

body{

margin:0;
background:#0b141a;
color:white;
font-family:Poppins,Arial,sans-serif;

}


.container{

padding:20px;
padding-bottom:90px;

}



.header{

background:#202c33;
padding:20px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;

}



.create-btn{

background:#25d366;
padding:12px 18px;
border-radius:25px;
color:white;
text-decoration:none;

}




.status-card{

background:#202c33;
margin-top:15px;
padding:20px;
border-radius:15px;

}



.status-name{

font-weight:bold;
font-size:18px;

}



.status-text{

margin-top:10px;
font-size:16px;

}



.time{

color:#aaa;
font-size:12px;

}





.empty{

text-align:center;
color:#aaa;
margin-top:50px;

}





.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#202c33;
display:flex;
justify-content:space-around;
align-items:center;

}




.bottom-nav a{

color:white;
text-decoration:none;
font-size:12px;
text-align:center;

}



.bottom-nav span{

display:block;
font-size:22px;

}



</style>

</head>



<body>



<div class="container">



<div class="header">


<h2>
⭕ Status
</h2>



<a href="create-status.html" class="create-btn">

+ Create

</a>


</div>






<div id="statusList">

<p class="empty">

Loading statuses...

</p>


</div>





</div>








<div class="bottom-nav">


<a href="home.html">

<span>
🏠
</span>

Home

</a>



<a href="chats.html">

<span>
💬
</span>

Chats

</a>



<a href="status.html">

<span>
⭕
</span>

Status

</a>



<a href="notifications.html">

<span>
🔔
</span>

Notifications

</a>



<a href="settings.html">

<span>
⚙️
</span>

Settings

</a>



</div>







<script type="module">


import { db } from "/Zswap-plus/firebase/firebase.js";



import {

collection,
query,
orderBy,
onSnapshot

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";






const statusList =

document.getElementById("statusList");







const statusQuery = query(

collection(db,"statuses"),

orderBy("createdAt","desc")

);







onSnapshot(statusQuery,(snapshot)=>{



statusList.innerHTML="";






if(snapshot.empty){



statusList.innerHTML = `

<p class="empty">

No statuses yet

</p>

`;

return;


}







snapshot.forEach((doc)=>{



const data = doc.data();






const card =

document.createElement("div");



card.className="status-card";






card.innerHTML = `


<div class="status-name">

${data.name}

</div>


<div class="status-text">

${data.text}

</div>


<div class="time">

Posted recently

</div>


`;






statusList.appendChild(card);



});




});





</script>





</body>

</html>
