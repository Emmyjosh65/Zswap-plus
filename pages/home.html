<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus</title>

<link rel="stylesheet" href="../css/auth.css">

<style>

body{
margin:0;
font-family:Poppins,Arial,sans-serif;
background:#0b141a;
color:white;
}


.app-container{
min-height:100vh;
padding-bottom:70px;
}


.header{

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

background:#111b21;

}


.logo{

font-size:28px;

font-weight:bold;

color:#25d366;

}


.content{

padding:20px;

}


.card{

background:#202c33;

padding:20px;

border-radius:15px;

margin-top:20px;

}


.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

height:65px;

background:#111b21;

display:flex;

justify-content:space-around;

align-items:center;

}


.bottom-nav a{

color:white;

text-decoration:none;

font-size:13px;

text-align:center;

}


.bottom-nav span{

display:block;

font-size:22px;

}


</style>

</head>


<body>


<div class="app-container">



<div class="header">


<div class="logo">
Z+
</div>


<div>
ZSwap Plus
</div>


</div>





<div class="content">


<h1>
Welcome 👋
</h1>


<p id="welcomeName">
Loading...
</p>




<div class="card">

<h2>
Start chatting
</h2>

<p>
Connect with people on ZSwap Plus.
</p>


</div>




</div>






<div class="bottom-nav">


<a href="home.html">

<span>🏠</span>

Home

</a>



<a href="chats.html">

<span>💬</span>

Chats

</a>




<a href="status.html">

<span>⭕</span>

Status

</a>




<a href="calls.html">

<span>📞</span>

Calls

</a>




<a href="settings.html">

<span>⚙️</span>

Settings

</a>



</div>



</div>





<script type="module">


import { auth, db } from "/Zswap-plus/firebase/firebase.js";


import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

doc,
getDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const welcomeName =

document.getElementById("welcomeName");





onAuthStateChanged(auth, async(user)=>{


if(user){


const userRef = doc(

db,

"users",

user.uid

);



const userSnap = await getDoc(userRef);



if(userSnap.exists()){


welcomeName.innerText =

"Welcome " + userSnap.data().name;


}



}

else{


window.location.href="../auth/login.html";


}



});



</script>


</body>

</html>
