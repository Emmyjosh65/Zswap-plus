<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Home</title>

<link rel="stylesheet" href="../css/auth.css">

<style>

body{

margin:0;

background:#0b141a;

color:white;

font-family:Poppins,Arial,sans-serif;

}


.app{

min-height:100vh;

padding-bottom:80px;

}



.header{

background:#202c33;

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

}



.logo{

font-size:30px;

font-weight:700;

color:#25d366;

}



.profile-btn{

background:#25d366;

color:white;

border:none;

border-radius:50%;

width:40px;

height:40px;

font-size:20px;

}



.search{

margin:20px;

background:#202c33;

padding:12px 15px;

border-radius:20px;

}



.search input{

width:100%;

background:none;

border:none;

outline:none;

color:white;

font-size:16px;

}



.welcome{

padding:20px;

}



.card{

background:#202c33;

margin:20px;

padding:20px;

border-radius:15px;

}



.card h2{

margin-top:0;

}



.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

height:70px;

background:#202c33;

display:flex;

justify-content:space-around;

align-items:center;

}



.bottom-nav a{

color:white;

text-decoration:none;

font-size:12px;

text-align:center;

}



.bottom-nav span{

display:block;

font-size:22px;

}



</style>

</head>



<body>



<div class="app">



<div class="header">


<div class="logo">

Z+

</div>


<h3>
ZSwap Plus
</h3>


<button class="profile-btn" onclick="openProfile()">

👤

</button>


</div>





<div class="search">

<input placeholder="Search chats, people...">

</div>





<div class="welcome">


<h1 id="welcomeName">

Welcome

</h1>


<p>
Connect, chat and share with people.
</p>


</div>





<div class="card">


<h2>
💬 Chats
</h2>


<p>
Start a conversation with your friends.
</p>


</div>





<div class="card">


<h2>
⭕ Status
</h2>


<p>
Share updates with your contacts.
</p>


</div>





<div class="bottom-nav">


<a href="home.html">

<span>🏠</span>

Home

</a>



<a href="chats.html">

<span>💬</span>

Chats

</a>



<a href="status.html">

<span>⭕</span>

Status

</a>



<a href="calls.html">

<span>📞</span>

Calls

</a>



<a href="settings.html">

<span>⚙️</span>

Settings

</a>


</div>



</div>






<script type="module">


import { auth, db } from "/Zswap-plus/firebase/firebase.js";


import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const welcomeName =

document.getElementById("welcomeName");





onAuthStateChanged(auth, async(user)=>{


if(user){


const userData = await getDoc(

doc(db,"users",user.uid)

);



if(userData.exists()){


welcomeName.innerText =

"Welcome " + userData.data().name + " 👋";


}



}

else{


window.location.href="../auth/login.html";


}



});





window.openProfile = function(){


window.location.href="settings.html";


}



</script>

<script type="module" src="../js/status-online.js"></script>

</body>

</html>
