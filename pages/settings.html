<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Settings</title>

<link rel="stylesheet" href="../css/auth.css">

<style>

body{
margin:0;
background:#0b141a;
color:white;
font-family:Poppins,Arial,sans-serif;
}

.app{
min-height:100vh;
padding-bottom:80px;
}

.header{
background:#202c33;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#25d366;
}

.profile-card{
margin:20px;
background:#202c33;
padding:25px;
border-radius:15px;
text-align:center;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#25d366;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
margin:auto;
}

.option{
margin:15px 20px;
padding:18px;
background:#202c33;
border-radius:12px;
}

button{
width:90%;
margin:20px;
padding:15px;
border:none;
border-radius:25px;
background:#25d366;
color:white;
font-size:16px;
}


.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#202c33;
display:flex;
justify-content:space-around;
align-items:center;

}

.bottom-nav a{

color:white;
text-decoration:none;
font-size:12px;
text-align:center;

}

.bottom-nav span{

display:block;
font-size:22px;

}

</style>

</head>


<body>


<div class="app">


<div class="header">

<div class="logo">
Z+
</div>

<h2>
Settings
</h2>

</div>





<div class="profile-card">


<div class="avatar">
👤
</div>


<h2 id="userName">
Loading...
</h2>


<p id="userEmail">
Loading...
</p>


</div>




<div class="option">
👤 Edit Profile
</div>


<div class="option">
🔒 Privacy
</div>


<div class="option">
🔔 Notifications
</div>


<button id="logoutBtn">
Logout
</button>





<div class="bottom-nav">


<a href="home.html">
<span>🏠</span>
Home
</a>


<a href="chats.html">
<span>💬</span>
Chats
</a>


<a href="status.html">
<span>⭕</span>
Status
</a>


<a href="calls.html">
<span>📞</span>
Calls
</a>


<a href="settings.html">
<span>⚙️</span>
Settings
</a>


</div>



</div>





<script type="module">


import { auth, db } from "/Zswap-plus/firebase/firebase.js";


import {
onAuthStateChanged,
signOut
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {
doc,
getDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const userName =
document.getElementById("userName");


const userEmail =
document.getElementById("userEmail");



onAuthStateChanged(auth, async(user)=>{


if(user){


userEmail.innerText = user.email;



const userSnap = await getDoc(
doc(db,"users",user.uid)
);



if(userSnap.exists()){

userName.innerText =
userSnap.data().name;

}



}

else{

window.location.href="../auth/login.html";

}


});





document.getElementById("logoutBtn")
.addEventListener("click", async()=>{


await signOut(auth);


window.location.href="../auth/login.html";


});


</script>


</body>

</html>
