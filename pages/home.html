<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Home</title>


<style>

body{

margin:0;
background:#0b141a;
color:white;
font-family:Poppins,Arial,sans-serif;

}


.app{

min-height:100vh;
padding-bottom:90px;

}



.header{

background:#202c33;
padding:20px;
display:flex;
align-items:center;
gap:15px;

}



.logo{

font-size:30px;
font-weight:bold;
color:#25d366;

}




.profile-card{

margin:20px;
background:#202c33;
padding:25px;
border-radius:15px;
text-align:center;

}



.profile-image{

width:90px;
height:90px;
border-radius:50%;
object-fit:cover;

}




.welcome{

font-size:22px;
font-weight:bold;

}




.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;

}




.card{

background:#202c33;
padding:25px;
border-radius:15px;
text-align:center;
cursor:pointer;

}



.card span{

font-size:35px;
display:block;

}




.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#202c33;
display:flex;
justify-content:space-around;
align-items:center;

}




.bottom-nav a{

color:white;
text-decoration:none;
font-size:12px;
text-align:center;

}



.bottom-nav span{

display:block;
font-size:22px;

}


</style>

</head>



<body>


<div class="app">


<div class="header">


<div class="logo">

Z+

</div>


<h2>
ZSwap Plus
</h2>


</div>





<div class="profile-card">


<img

id="profileImage"

src="../assets/default-avatar.png"

class="profile-image"


>



<h2 class="welcome">

Hello, <span id="userName">User</span>

</h2>



<p id="userEmail">

Loading...

</p>



</div>







<div class="grid">



<div class="card" onclick="location.href='chats.html'">

<span>
💬
</span>

Chats

</div>




<div class="card" onclick="location.href='contacts.html'">

<span>
👥
</span>

Contacts

</div>





<div class="card" onclick="location.href='search-users.html'">

<span>
🔍
</span>

Search Users

</div>





<div class="card" onclick="location.href='settings.html'">

<span>
⚙️
</span>

Settings

</div>



</div>









<div class="bottom-nav">


<a href="home.html">

<span>🏠</span>

Home

</a>



<a href="chats.html">

<span>💬</span>

Chats

</a>



<a href="contacts.html">

<span>👥</span>

Contacts

</a>



<a href="settings.html">

<span>⚙️</span>

Settings

</a>



</div>





</div>







<script type="module">


import { auth, db } from "/Zswap-plus/firebase/firebase.js";


import {

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

doc,
getDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const userName =
document.getElementById("userName");


const userEmail =
document.getElementById("userEmail");


const profileImage =
document.getElementById("profileImage");







onAuthStateChanged(auth, async(user)=>{


if(!user){

window.location.href="../auth/login.html";

return;

}





userEmail.innerText =
user.email;





const snap =
await getDoc(

doc(db,"users",user.uid)

);





if(snap.exists()){


const data =
snap.data();



userName.innerText =
data.name;



if(data.photoURL){

profileImage.src =
data.photoURL;

}



}



});



</script>



</body>

</html>
