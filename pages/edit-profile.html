<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile - ZSwap Plus</title>


<style>

body{

margin:0;
background:#0b141a;
color:white;
font-family:Poppins,Arial,sans-serif;

}


.container{

padding:20px;

}



.header{

background:#202c33;
padding:20px;
border-radius:15px;

}



.profile-box{

background:#202c33;
margin-top:20px;
padding:20px;
border-radius:15px;

}



.avatar{

width:100px;
height:100px;
border-radius:50%;
background:#25d366;
display:block;
margin:auto;
object-fit:cover;

}



input, textarea{

width:100%;
box-sizing:border-box;
margin-top:15px;
padding:15px;
background:#111b21;
border:none;
border-radius:10px;
color:white;
font-size:15px;

}



textarea{

height:100px;

}



button{

width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:25px;
background:#25d366;
color:white;
font-size:16px;

}



.back{

color:white;
text-decoration:none;

}


</style>


</head>




<body>



<div class="container">



<div class="header">


<a class="back" href="settings.html">

← Back

</a>


<h2>

Edit Profile

</h2>


</div>







<div class="profile-box">



<img

id="profileImage"

src="../assets/default-avatar.png"

class="avatar"

>





<input

id="name"

placeholder="Full name"

>





<input

id="username"

placeholder="Username"

>





<textarea

id="bio"

placeholder="About you"

></textarea>







<button id="saveBtn">

Save Profile

</button>





</div>




</div>







<script type="module"

src="../js/edit-profile.js">

</script>



</body>

</html>
