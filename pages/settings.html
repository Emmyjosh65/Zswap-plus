<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZSwap Plus Settings</title>


<style>

body{

margin:0;
background:#0b141a;
color:white;
font-family:Poppins,Arial,sans-serif;

}



.app{

min-height:100vh;
padding-bottom:80px;

}



.header{

background:#202c33;
padding:20px;
display:flex;
align-items:center;
gap:15px;

}



.logo{

font-size:28px;
font-weight:bold;
color:#25d366;

}




.profile-card{

margin:20px;
background:#202c33;
padding:25px;
border-radius:15px;
text-align:center;

}



.profile-image{

width:90px;
height:90px;
border-radius:50%;
object-fit:cover;

}




#userUsername{

color:#25d366;

}



#userBio{

color:#aaa;

}





.option{

margin:15px 20px;
padding:18px;
background:#202c33;
border-radius:12px;

}



.option a{

color:white;
text-decoration:none;

}



button{

width:90%;
margin:20px;
padding:15px;
border:none;
border-radius:25px;
background:#25d366;
color:white;
font-size:16px;

}





.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#202c33;
display:flex;
justify-content:space-around;
align-items:center;

}



.bottom-nav a{

color:white;
text-decoration:none;
font-size:12px;
text-align:center;

}



.bottom-nav span{

display:block;
font-size:22px;

}


</style>

</head>





<body>


<div class="app">





<div class="header">


<div class="logo">

Z+

</div>


<h2>

Settings

</h2>


</div>







<div class="profile-card">



<img

id="profileImage"

src="../assets/default-avatar.png"

class="profile-image"

>





<h2 id="userName">

Loading...

</h2>




<p id="userUsername">

</p>




<p id="userBio">

</p>





<p id="userEmail">

Loading...

</p>




</div>







<div class="option">

<a href="edit-profile.html">

👤 Edit Profile

</a>

</div>





<div class="option">

🔒 Privacy

</div>





<div class="option">

🔔 Notifications

</div>






<button id="logoutBtn">

Logout

</button>








<div class="bottom-nav">

<span>🏠</span>

Home

</a>
